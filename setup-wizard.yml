version: "2"
fields:
  - id: setupNotice
    target:
      type: environment
      name: _SETUP_NOTICE
      service: api
    title: Setup Instructions
    description: >-
      After installation, open the **Setup Wizard UI** at
      http://setup-wizard.honcho.dappnode:8080 to configure your
      AI provider, API key, and model. The Setup Wizard will write
      all necessary environment variables for Honcho.
    enum:
      - "I understand"
    required: true
