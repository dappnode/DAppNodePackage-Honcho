version: "3.5"
services:
  api:
    build:
      context: honcho
      args:
        UPSTREAM_VERSION: v3.0.6
    image: api.honcho.dnp.dappnode.eth:0.1.0
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HONCHO_ROLE: api
      DB_CONNECTION_URI: postgresql+psycopg://honcho:honcho@database:5432/honcho
      CACHE_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
      LLM_PROVIDER: openrouter
      LLM_MODEL: google/gemini-flash-1.5
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: honcho
      POSTGRES_DB: honcho
    volumes:
      - honcho-backup:/backup
  deriver:
    build:
      context: honcho
      args:
        UPSTREAM_VERSION: v3.0.6
    image: deriver.honcho.dnp.dappnode.eth:0.1.0
    restart: unless-stopped
    environment:
      HONCHO_ROLE: deriver
      DB_CONNECTION_URI: postgresql+psycopg://honcho:honcho@database:5432/honcho
      CACHE_URL: redis://redis:6379/0
      CACHE_ENABLED: "true"
      LLM_PROVIDER: openrouter
      LLM_MODEL: google/gemini-flash-1.5
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
  setup-wizard:
    build:
      context: setup-wizard
    image: setup-wizard.honcho.dnp.dappnode.eth:0.1.0
    restart: unless-stopped
    ports:
      - "8080:80"
  database:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: honcho
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: honcho
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - honcho-db-data:/var/lib/postgresql/data
    command:
      - postgres
      - "-c"
      - max_connections=200
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - honcho-redis-data:/data
    command:
      - redis-server
      - "--save"
      - "60"
      - "1"
      - "--loglevel"
      - warning
volumes:
  honcho-db-data: {}
  honcho-redis-data: {}
  honcho-backup: {}
